{% extends "base.html" %}

{% block title %}Interest Calculator{% endblock %}

{% block head_scripts %}<script src="/static/js/vendor/chart.umd.min.js"></script>{% endblock %}

{% block head_styles %}<style>
.app-canvas{max-width:560px;}
#interest-form{display:grid;grid-template-columns:1fr 1fr;gap:.7rem .9rem;}
#interest-form .field{margin-bottom:0;}
#interest-form .form-row:first-child,#periods-row{grid-column:1 / -1;}
#interest-form > button{grid-column:1 / -1;margin-top:.2rem;}
.res-total-big{font-size:1.9rem;font-weight:600;letter-spacing:-.02em;line-height:1.1;color:#fff;}
#res-spark-wrap{position:relative;height:84px;margin-top:.65rem;}
</style>{% endblock %}

{% block content %}
  <div class="page-header">
    <h1>Interest calculator</h1>
  </div>

  <div id="msg-area"></div>

  <div class="glass-panel">
    <form id="interest-form">
      <div class="form-row field">
        <label for="type">Interest Type</label>
        <select name="type" id="type" required>
          <option value="simple">Simple</option>
          <option value="compound">Compound</option>
          <option value="continuous">Continuous</option>
        </select>
      </div>
      <div class="form-row field">
        <label for="principal">Principal</label>
        <input type="number" step="any" inputmode="decimal" name="principal" id="principal" required placeholder="e.g. 10000">
      </div>
      <div class="form-row field">
        <label for="rate">Rate (%)</label>
        <input type="number" step="any" inputmode="decimal" name="rate" id="rate" required placeholder="e.g. 5">
      </div>
      <div class="form-row field">
        <label for="years">Time (years)</label>
        <input type="number" step="any" inputmode="decimal" name="years" id="years" required placeholder="e.g. 3">
      </div>
      <div class="form-row field" id="periods-row" style="display:none;">
        <label for="periods">Compounding Periods per Year</label>
        <input type="number" step="any" inputmode="decimal" name="periods" id="periods" value="1" placeholder="e.g. 12 for monthly">
      </div>
      <button class="btn btn-gradient" type="submit">Calculate</button>
    </form>
  </div>

  <div class="gradient-card result" id="result-box" style="display:none;">
    <h2 id="res-desc" style="font-size:.95rem;font-weight:500;opacity:.9;margin:0 0 .3rem;"></h2>
    <div class="res-total-big">$<span id="res-total"></span></div>
    <p style="opacity:.9;margin:.15rem 0 0;font-size:.9rem;">+ $<span id="res-interest"></span> interest earned</p>
    <div id="res-spark-wrap"><canvas id="res-spark" role="img" aria-label="Projected growth of the investment over time"></canvas></div>
  </div>
{% endblock %}

{% block body_scripts %}
<script nonce="{{ csp_nonce }}">
  function togglePeriods(){
    const type=document.getElementById('type').value;
    document.getElementById('periods-row').style.display=type==='compound'?'block':'none';
  }
  document.getElementById('type').addEventListener('change',togglePeriods);
  togglePeriods();

  function showError(msg){
    const area=document.getElementById('msg-area');
    area.innerHTML='<div class="error">'+msg+'</div>';
    document.getElementById('result-box').style.display='none';
  }
  function clearMsg(){ document.getElementById('msg-area').innerHTML=''; }

  function simpleInterest(p,r,t){
    const interest=p*(r/100)*t;
    return {interest, total:p+interest};
  }
  function compoundInterest(p,r,t,n){
    if(n<=0) throw new Error('Compounding periods must be positive.');
    const amount=p*Math.pow(1+(r/100/n),n*t);
    return {interest:amount-p, total:amount};
  }
  function continuousInterest(p,r,t){
    const amount=p*Math.exp((r/100)*t);
    return {interest:amount-p, total:amount};
  }

  document.getElementById('interest-form').addEventListener('submit',function(e){
    e.preventDefault();
    clearMsg();
    const type=document.getElementById('type').value;
    const p=parseFloat(document.getElementById('principal').value);
    const r=parseFloat(document.getElementById('rate').value);
    const t=parseFloat(document.getElementById('years').value);
    const n=parseFloat(document.getElementById('periods').value)||1;

    if(isNaN(p)||p<0){ showError('Principal must be a non-negative number.'); return; }
    if(isNaN(r)||r<0){ showError('Rate must be a non-negative number.'); return; }
    if(isNaN(t)||t<=0){ showError('Time must be a positive number.'); return; }

    let result;
    try{
      if(type==='compound')        result=compoundInterest(p,r,t,n);
      else if(type==='continuous') result=continuousInterest(p,r,t);
      else                         result=simpleInterest(p,r,t);
    }catch(err){
      showError(err.message); return;
    }

    const desc =
      type==='compound'   ? 'Compound Interest (n='+n+'/yr, t='+t+' yr)' :
      type==='continuous' ? 'Continuous Compounding (r='+r+'%, t='+t+' yr)' :
                            'Simple Interest (r='+r+'%, t='+t+' yr)';

    document.getElementById('res-desc').textContent=desc;
    document.getElementById('result-box').style.display='block';
    countUp(document.getElementById('res-total'), result.total);
    countUp(document.getElementById('res-interest'), result.interest);
    drawSparkline(p, r, t, n, type);
  });

  var _reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function countUp(el, target){
    if(!el) return;
    if(_reduce){ el.textContent=target.toFixed(2); return; }
    var start=performance.now(), dur=650;
    function step(now){
      var k=Math.min(1,(now-start)/dur), e=1-Math.pow(1-k,3);
      el.textContent=(target*e).toFixed(2);
      if(k<1) requestAnimationFrame(step); else el.textContent=target.toFixed(2);
    }
    requestAnimationFrame(step);
  }

  var _spark=null;
  function _valueAt(p,r,t,n,type,yr){
    if(type==='compound')   return p*Math.pow(1+(r/100/n),n*yr);
    if(type==='continuous') return p*Math.exp((r/100)*yr);
    return p + p*(r/100)*yr;
  }
  function drawSparkline(p,r,t,n,type){
    var cv=document.getElementById('res-spark'); if(!cv||typeof Chart==='undefined') return;
    var steps=Math.max(2,Math.min(40,Math.ceil(t))), labels=[], data=[];
    for(var i=0;i<=steps;i++){ var yr=t*i/steps; labels.push(yr.toFixed(1)); data.push(Math.round(_valueAt(p,r,t,n,type,yr))); }
    if(_spark) _spark.destroy();
    _spark=new Chart(cv,{type:'line',
      data:{labels:labels,datasets:[{data:data,borderColor:'#fff',backgroundColor:'rgba(255,255,255,.18)',fill:true,tension:.35,pointRadius:0,borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,animation:!_reduce,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{x:{display:false},y:{display:false}}}});
  }
</script>
{% endblock %}
