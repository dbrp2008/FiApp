<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>500 - Server Error</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="/static/js/theme-core.js?v={{ ASSET_V }}"></script>
  <script nonce="{{ csp_nonce }}">(function(){var t=localStorage.getItem('fiapp_theme')||'{{ theme|default("light") }}';if(window.fiappThemeBoot){fiappThemeBoot(t);}else if(t==='dark'||localStorage.getItem('fiapp_theme_mode')==='dark')document.documentElement.classList.add('dark');})();</script>
  <link rel="stylesheet" href="/styles.css?v={{ ASSET_V }}">
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:1rem;padding:2rem;">
    <div class="glass-panel aurora-bg" style="text-align:center;max-width:520px;margin:2rem auto;">
      <div style="font-size:3.5rem;">⚠️</div>
      <h1 style="font-size:2rem;margin:0;">500 - Server Error</h1>
      <p style="color:var(--muted);max-width:400px;">Something went wrong on our end. Please try again in a moment.</p>
      <a href="/" class="btn btn-gradient" style="margin-top:.5rem;">Back to dashboard</a>
    </div>
  </div>
</body>
</html>
